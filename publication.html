<script>
    const publicationManifestPath = './publications/index.json';
    const publicationVersion = '20260626-publication-lazy';
    const publicationYearCache = {};
    function setPanelOpen(header, isOpen) {
      const content = header.nextElementSibling;
      const arrowIcon = header.querySelector('.arrow');

      content.classList.toggle('active', isOpen);
      arrowIcon.classList.toggle('fa-arrow-down', isOpen);
      arrowIcon.classList.toggle('fa-arrow-right', !isOpen);
    }

    async function togglePublicationPanel(header) {
      const content = header.nextElementSibling;
      const isOpening = !content.classList.contains('active');
      setPanelOpen(header, isOpening);

      if (isOpening) {
        await ensurePublicationCategoryLoaded(header.closest('.panel'));
      }
    }

    function createPublicationLink(label, href, className) {
      if (!href) {
        return null;
      }

      const link = document.createElement('a');
      link.className = className;
      link.href = href;
      link.textContent = `[${label}]`;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      return link;
    }

    function createPublicationItem(publication) {
      const item = document.createElement('li');
      item.className = 'publication-item';

      const title = document.createElement('span');
      title.className = 'publication-title';
      title.textContent = `${publication.title}.`;
      item.appendChild(title);
      item.appendChild(document.createElement('br'));

      const authors = document.createElement('span');
      authors.className = 'publication-authors';
      authors.textContent = publication.authors || '';
      item.appendChild(authors);
      item.appendChild(document.createElement('br'));

      const venue = document.createElement('span');
      venue.className = 'publication-venue';
      venue.textContent = publication.venue ? `${publication.venue}.` : '';
      item.appendChild(venue);

      const paper = createPublicationLink('paper', publication.paper, 'publication-paper-link');
      const code = createPublicationLink('code', publication.code, 'publication-code-link');
      if (paper) {
        item.appendChild(document.createTextNode(' '));
        item.appendChild(paper);
      }
      if (code) {
        item.appendChild(document.createTextNode(' '));
        item.appendChild(code);
      }

      return item;
    }

    function createPublicationPanel(yearData, category) {
      const panel = document.createElement('div');
      panel.className = 'panel';
      panel.style.borderBottom = '1px solid rgba(0, 0, 0, .15)';
      panel.dataset.year = yearData.year;
      panel.dataset.category = category;
      panel.dataset.loaded = 'false';

      const header = document.createElement('div');
      header.className = 'panel-header';
      header.onclick = function () {
        togglePublicationPanel(header);
      };

      const heading = document.createElement('h4');
      const icon = document.createElement('i');
      icon.className = `fas ${yearData.active ? 'fa-arrow-down' : 'fa-arrow-right'} arrow`;
      heading.appendChild(icon);
      heading.appendChild(document.createTextNode(` ${yearData.year}`));
      header.appendChild(heading);

      const content = document.createElement('div');
      content.className = `panel-content${yearData.active ? ' active' : ''}`;
      content.dataset.year = yearData.year;
      content.innerHTML = '<p class="publication-loading">Loading publications...</p>';

      panel.appendChild(header);
      panel.appendChild(content);

      return panel;
    }

    async function loadJson(path) {
      const response = await fetch(`${path}${path.includes('?') ? '&' : '?'}v=${publicationVersion}`);
      if (!response.ok) {
        throw new Error(`Failed to load ${path}: ${response.status}`);
      }
      return response.json();
    }

    async function getPublicationYearData(year) {
      if (!publicationYearCache[year]) {
        publicationYearCache[year] = loadJson(`./publications/${year}.json`);
      }

      return await publicationYearCache[year];
    }

    function renderPublicationEntries(content, yearPublications, category) {
      const entries = Array.isArray(yearPublications[category]) ? yearPublications[category] : [];
      if (!entries.length) {
        content.innerHTML = '<p class="publication-loading">No publications found for this category.</p>';
        return;
      }

      const list = document.createElement('ul');
      list.style.marginBottom = '5px';
      entries
        .slice()
        .sort((a, b) => (a.order || 0) - (b.order || 0))
        .forEach(publication => {
          list.appendChild(createPublicationItem(publication));
        });

      content.appendChild(list);
    }

    async function ensurePublicationCategoryLoaded(panel) {
      if (!panel || panel.dataset.loaded === 'true' || panel.dataset.loading === 'true') {
        return;
      }

      const year = panel.dataset.year;
      const category = panel.dataset.category;
      const content = panel.querySelector('.panel-content');
      if (!year || !category || !content) {
        return;
      }

      panel.dataset.loading = 'true';
      content.innerHTML = '<p class="publication-loading">Loading publications...</p>';

      try {
        const yearPublications = await getPublicationYearData(year);
        content.innerHTML = '';
        renderPublicationEntries(content, yearPublications, category);
        panel.dataset.loaded = 'true';
      } catch (error) {
        console.error(error);
        content.innerHTML = '<p class="publication-loading">Failed to load publications. Please refresh the page.</p>';
      } finally {
        panel.dataset.loading = 'false';
      }
    }

    function renderPublicationCategory(container, title, years, category) {
      const headingWrap = document.createElement('div');
      headingWrap.style.marginBottom = '20px';
      if (category === 'conference') {
        headingWrap.style.marginTop = '50px';
      }

      const heading = document.createElement('h2');
      heading.textContent = title;
      headingWrap.appendChild(heading);
      container.appendChild(headingWrap);

      const activePanels = [];
      years.forEach(yearData => {
        const panel = createPublicationPanel(yearData, category);
        container.appendChild(panel);

        if (yearData.active) {
          activePanels.push(panel);
        }
      });

      return activePanels;
    }

    async function renderPublicationsFromJson() {
      const container = document.getElementById('publication-content');
      if (!container) {
        return;
      }

      try {
        const manifest = await loadJson(publicationManifestPath);
        const years = Array.isArray(manifest.years) ? manifest.years : [];

        container.innerHTML = '';

        const scholarNote = document.createElement('p');
        scholarNote.innerHTML = 'An up-to-date full paper list can be found in <a style="color: rgb(180,16,10);" href="https://scholar.google.com.hk/citations?hl=zh-CN&user=kCtQkrkAAAAJ">Google Scholar</a> page.';
        container.appendChild(scholarNote);

        const activePanels = [
          ...renderPublicationCategory(container, 'Journal', years, 'journal'),
          ...renderPublicationCategory(container, 'Conference', years, 'conference')
        ];

        await Promise.all(activePanels.map(panel => ensurePublicationCategoryLoaded(panel)));
      } catch (error) {
        console.error(error);
        const loading = container.querySelector('.publication-loading');
        if (loading) {
          loading.textContent = 'Failed to load publications. Please refresh the page.';
        }
      }
    }

    document.addEventListener('DOMContentLoaded', renderPublicationsFromJson);
  </script>
