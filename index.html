<style>
    .image-container img {
  width: 100%;  /* 图片填满容器宽度 */

<script src="./jquery-1.11.1.min.js"></script>
<script>
    const newsManifestPath = './news/index.json?v=20260626-news';
    const galleryPath = './gallery/gallery.json?v=20260626-gallery';
    const monthLabels = {
        '01': 'Jan.',
        '02': 'Feb.',
        '03': 'Mar.',
        '04': 'Apr.',
        '05': 'May.',
        '06': 'Jun.',
        '07': 'Jul.',
        '08': 'Aug.',
        '09': 'Sep.',
        '10': 'Oct.',
        '11': 'Nov.',
        '12': 'Dec.'
    };

    function togglePanel(header) {
        const content = header.nextElementSibling;
        const arrowIcon = header.querySelector('.arrow');
        content.classList.toggle('active');
        if (content.classList.contains('active')) {
            arrowIcon.classList.remove('fa-arrow-right');
            arrowIcon.classList.add('fa-arrow-down');
        } else {
            arrowIcon.classList.remove('fa-arrow-down');
            arrowIcon.classList.add('fa-arrow-right');
        }
    }

    async function loadJson(path) {
        const response = await fetch(path, { cache: 'no-store' });
        if (!response.ok) {
            throw new Error(`Failed to load ${path}: ${response.status}`);
        }
        return response.json();
    }

    function createNewsMonthBlock(month, items) {
        const monthBlock = document.createElement('div');
        monthBlock.className = 'news-month';

        const heading = document.createElement('h5');
        heading.style.color = 'rgb(68, 68, 68)';
        heading.textContent = `[${monthLabels[month] || month}]`;
        monthBlock.appendChild(heading);

        const list = document.createElement('ul');
        list.style.marginBottom = '5px';
        items.forEach(item => {
            const listItem = document.createElement('li');
            listItem.textContent = item;
            list.appendChild(listItem);
        });
        monthBlock.appendChild(list);

        return monthBlock;
    }

    async function createNewsPanel(yearData, isLastPanel) {
        const panel = document.createElement('div');
        panel.className = 'panel';
        if (!isLastPanel) {
            panel.style.borderBottom = '1px solid rgba(0, 0, 0, .15)';
        }

        const header = document.createElement('div');
        header.className = 'panel-header';
        header.onclick = function () {
            togglePanel(header);
        };

        const title = document.createElement('h2');
        const arrow = document.createElement('i');
        arrow.className = `fas ${yearData.active ? 'fa-arrow-down' : 'fa-arrow-right'} arrow`;
        title.appendChild(arrow);
        title.appendChild(document.createTextNode(` ${yearData.year}`));
        header.appendChild(title);

        const content = document.createElement('div');
        content.className = `panel-content${yearData.active ? ' active' : ''}`;

        const months = Array.isArray(yearData.months) ? yearData.months : [];
        for (const month of months) {
            const monthPath = `./news/${yearData.year}/${month}.json?v=20260626-news`;
            const items = await loadJson(monthPath);
            if (Array.isArray(items) && items.length) {
                content.appendChild(createNewsMonthBlock(month, items));
            }
        }

        panel.appendChild(header);
        panel.appendChild(content);
        return panel;
    }

    async function loadNews() {
        const container = document.getElementById('news-content');
        if (!container) {
            return;
        }

        try {
            const manifest = await loadJson(newsManifestPath);
            const years = Array.isArray(manifest.years) ? manifest.years : [];
            container.innerHTML = '';

            for (let index = 0; index < years.length; index += 1) {
                const panel = await createNewsPanel(years[index], index === years.length - 1);
                container.appendChild(panel);
            }
        } catch (error) {
            console.error(error);
            container.innerHTML = '<p class="news-loading">Failed to load news. Please refresh the page.</p>';
        }
    }

    let currentIndex = 0;
    let galleryAutoTimer = null;
    let galleryAutoPaused = false;
    const galleryAutoInterval = 5000;
    let highlightIndex = 0;
    let highlightItems = [];
    let highlightAutoTimer = null;
    let highlightAutoPaused = false;
    const highlightAutoInterval = 6000;
    const fallbackGalleryItems = [
        {
            image: './gallery/gallery_images/group1.webp',
            alt: 'Deep Imaging Group photo 1'
        },
        {
            image: './gallery/gallery_images/group2.webp',
            alt: 'Deep Imaging Group photo 2'
        },
        {
            image: './gallery/gallery_images/group3.webp',
            alt: 'Deep Imaging Group photo 3'
        }
    ];
    const fallbackHighlightItems = [
        {
            title: 'Patient-Level Anatomy Meets Scanning-Level Physics: Personalized Federated Low-Dose CT Denoising Empowered by Large Language Model',
            author: 'Ziyuan Yang et al.',
            venue: 'CVPR',
            year: '2025',
            image: './highlight/highlight_images/LLMCT.webp',
            paper: 'https://arxiv.org/abs/2503.00908',
            code: ''
        },
        {
            title: 'FedRIR: Rethinking Information Representation in Federated Learning',
            author: 'Yongqiang Huang et al.',
            venue: 'WWW',
            year: '2025',
            image: './highlight/highlight_images/FedRIR.webp',
            paper: 'https://arxiv.org/abs/2502.00859',
            code: ''
        },
        {
            title: 'Poisoned Distillation: Injecting Backdoors into Distilled Datasets Without Raw Data Access',
            author: 'Ziyuan Yang et al.',
            venue: 'AAAI',
            year: '2026',
            image: './highlight/highlight_images/2026_AAAI.png',
            paper: 'https://ojs.aaai.org/index.php/AAAI/article/view/37119',
            code: ''
        }
    ];

    function resetGalleryAutoScroll() {
        stopGalleryAutoScroll();
        startGalleryAutoScroll();
    }

    function stopGalleryAutoScroll() {
        if (galleryAutoTimer) {
            clearInterval(galleryAutoTimer);
            galleryAutoTimer = null;
        }
    }

    function startGalleryAutoScroll() {
        stopGalleryAutoScroll();
        const totalImages = document.querySelectorAll('.slider img').length;
        if (galleryAutoPaused || document.hidden || totalImages <= 1) {
            return;
        }

        galleryAutoTimer = setInterval(function () {
            changeImage(1, false);
        }, galleryAutoInterval);
    }

    function setGalleryAutoPaused(paused) {
        galleryAutoPaused = paused;
        if (paused) {
            stopGalleryAutoScroll();
        } else {
            startGalleryAutoScroll();
        }
    }

    function changeImage(direction, userAction) {
        const images = document.querySelectorAll('.slider img');
        const totalImages = images.length;
        if (!totalImages) {
            return;
        }

        // Calculate new index
        currentIndex = (currentIndex + direction + totalImages) % totalImages;

        // Move the slider
        document.querySelector('.slider').style.transform = `translateX(-${currentIndex * 100}%)`;
        updateGalleryControls();
        if (userAction) {
            resetGalleryAutoScroll();
        }
    }

    function updateGalleryControls() {
        const dots = document.querySelectorAll('.gallery-dot');
        const navButtons = document.querySelectorAll('.gallery-nav');
        const totalImages = document.querySelectorAll('.slider img').length;

        dots.forEach((dot, index) => {
            dot.classList.toggle('active', index === currentIndex);
        });

        navButtons.forEach(button => {
            button.disabled = totalImages <= 1;
        });
    }

    function goToGalleryImage(index, userAction) {
        const totalImages = document.querySelectorAll('.slider img').length;
        if (!totalImages) {
            return;
        }

        currentIndex = index;
        document.querySelector('.slider').style.transform = `translateX(-${currentIndex * 100}%)`;
        updateGalleryControls();
        if (userAction) {
            resetGalleryAutoScroll();
        }
    }

    function renderGalleryIndicators(count) {
        const indicators = document.getElementById('gallery-indicators');
        if (!indicators) {
            return;
        }

        indicators.innerHTML = '';
        for (let index = 0; index < count; index += 1) {
            const dot = document.createElement('button');
            dot.type = 'button';
            dot.className = `gallery-dot${index === currentIndex ? ' active' : ''}`;
            dot.setAttribute('aria-label', `Go to gallery image ${index + 1}`);
            dot.onclick = function () {
                goToGalleryImage(index, true);
            };
            indicators.appendChild(dot);
        }
    }

    function bindGalleryAutoScroll() {
        const container = document.querySelector('.slider-container');
        if (!container || container.dataset.bound === 'true') {
            return;
        }

        container.dataset.bound = 'true';
        container.addEventListener('mouseenter', function () {
            setGalleryAutoPaused(true);
        });
        container.addEventListener('mouseleave', function () {
            setGalleryAutoPaused(false);
        });
        container.addEventListener('focusin', function () {
            setGalleryAutoPaused(true);
        });
        container.addEventListener('focusout', function () {
            setGalleryAutoPaused(false);
        });
        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                stopGalleryAutoScroll();
            } else {
                startGalleryAutoScroll();
            }
        });
    }

    function renderGallery(items) {
        const slider = document.getElementById('gallery-slider');
        if (!slider) {
            return;
        }

        currentIndex = 0;
        slider.innerHTML = '';
        slider.style.transform = 'translateX(0)';
        items.forEach((item, index) => {
            const image = document.createElement('img');
            image.src = item.image || '';
            image.alt = item.alt || `Gallery image ${index + 1}`;
            image.loading = index === 0 ? 'eager' : 'lazy';
            slider.appendChild(image);
        });
        renderGalleryIndicators(items.length);
        updateGalleryControls();
        bindGalleryAutoScroll();
        startGalleryAutoScroll();
    }

    async function loadGallery() {
        try {
            const items = await loadJson(galleryPath);
            if (!Array.isArray(items) || !items.length) {
                throw new Error('No gallery items found in gallery/gallery.json');
            }

            renderGallery(items);
        } catch (error) {
            console.error(error);
            renderGallery(fallbackGalleryItems);
        }
    }

    function createHighlightLink(label, href, className) {
        if (!href) {
            return null;
        }

        const link = document.createElement('a');
        link.className = className;
        link.href = href;
        link.textContent = `[${label}]`;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        return link;
    }

    function buildHighlightSlide(item) {
        const slide = document.createElement('article');
        slide.className = 'highlight-slide';

        const left = document.createElement('div');
        left.className = 'banner-left';

        const imageContainer = document.createElement('div');
        imageContainer.className = 'image-container';

        const link = document.createElement('a');
        link.href = item.paper || '#';
        link.target = '_blank';
        link.rel = 'noopener noreferrer';

        const image = document.createElement('img');
        image.src = item.image || '';
        image.alt = item.title || 'Research highlight';
        image.loading = 'lazy';
        image.style.width = '100%';

        link.appendChild(image);
        imageContainer.appendChild(link);
        left.appendChild(imageContainer);

        const right = document.createElement('div');
        right.className = 'banner-right highlight-copy';

        const title = document.createElement('p');
        title.className = 'highlight-title';
        title.appendChild(document.createTextNode(item.title || ''));

        const paper = createHighlightLink('paper', item.paper, 'publication-paper-link');
        const code = createHighlightLink('code', item.code, 'publication-code-link');
        if (paper) {
            title.appendChild(document.createTextNode(' '));
            title.appendChild(paper);
        }
        if (code) {
            title.appendChild(document.createTextNode(' '));
            title.appendChild(code);
        }

        const meta = document.createElement('p');
        meta.className = 'highlight-meta';
        meta.textContent = [item.author, item.venue, item.year].filter(Boolean).join(', ');

        right.appendChild(title);
        right.appendChild(meta);

        slide.appendChild(left);
        slide.appendChild(right);

        return slide;
    }

    function renderHighlightIndicators() {
        const indicators = document.getElementById('highlight-indicators');
        indicators.innerHTML = '';

        highlightItems.forEach((_, index) => {
            const dot = document.createElement('button');
            dot.type = 'button';
            dot.className = `highlight-dot${index === highlightIndex ? ' active' : ''}`;
            dot.setAttribute('aria-label', `Go to highlight ${index + 1}`);
            dot.onclick = function () {
                goToHighlight(index, true);
            };
            indicators.appendChild(dot);
        });
    }

    function updateHighlightSlider() {
        const track = document.getElementById('highlight-track');
        const dots = document.querySelectorAll('.highlight-dot');
        const navButtons = document.querySelectorAll('.highlight-nav');

        if (!track || !highlightItems.length) {
            return;
        }

        track.style.transform = `translateY(-${highlightIndex * 100}%)`;
        dots.forEach((dot, index) => {
            dot.classList.toggle('active', index === highlightIndex);
        });

        navButtons.forEach(button => {
            button.disabled = highlightItems.length <= 1;
        });
    }

    function resetHighlightAutoScroll() {
        stopHighlightAutoScroll();
        startHighlightAutoScroll();
    }

    function stopHighlightAutoScroll() {
        if (highlightAutoTimer) {
            clearInterval(highlightAutoTimer);
            highlightAutoTimer = null;
        }
    }

    function startHighlightAutoScroll() {
        stopHighlightAutoScroll();
        if (highlightAutoPaused || document.hidden || highlightItems.length <= 1) {
            return;
        }

        highlightAutoTimer = setInterval(function () {
            changeHighlight(1, false);
        }, highlightAutoInterval);
    }

    function setHighlightAutoPaused(paused) {
        highlightAutoPaused = paused;
        if (paused) {
            stopHighlightAutoScroll();
        } else {
            startHighlightAutoScroll();
        }
    }

    function changeHighlight(direction, userAction) {
        if (!highlightItems.length) {
            return;
        }

        highlightIndex = (highlightIndex + direction + highlightItems.length) % highlightItems.length;
        updateHighlightSlider();
        if (userAction) {
            resetHighlightAutoScroll();
        }
    }

    function goToHighlight(index, userAction) {
        if (!highlightItems.length) {
            return;
        }

        highlightIndex = index;
        updateHighlightSlider();
        if (userAction) {
            resetHighlightAutoScroll();
        }
    }

    function bindHighlightGestures() {
        const slider = document.getElementById('highlight-slider');

        if (!slider || slider.dataset.bound === 'true') {
            return;
        }

        slider.dataset.bound = 'true';

        let touchStartY = 0;
        let touchDeltaY = 0;
        let wheelLocked = false;

        slider.addEventListener('touchstart', function (event) {
            touchStartY = event.changedTouches[0].clientY;
            touchDeltaY = 0;
        }, { passive: true });

        slider.addEventListener('touchmove', function (event) {
            touchDeltaY = event.changedTouches[0].clientY - touchStartY;
        }, { passive: true });

        slider.addEventListener('touchend', function () {
            if (Math.abs(touchDeltaY) < 50) {
                return;
            }

            changeHighlight(touchDeltaY < 0 ? 1 : -1, true);
        });

        slider.addEventListener('wheel', function (event) {
            if (wheelLocked || Math.abs(event.deltaY) < 20) {
                return;
            }

            event.preventDefault();
            wheelLocked = true;
            changeHighlight(event.deltaY > 0 ? 1 : -1, true);

            setTimeout(function () {
                wheelLocked = false;
            }, 400);
        }, { passive: false });

        slider.addEventListener('mouseenter', function () {
            setHighlightAutoPaused(true);
        });

        slider.addEventListener('mouseleave', function () {
            setHighlightAutoPaused(false);
        });

        slider.addEventListener('focusin', function () {
            setHighlightAutoPaused(true);
        });

        slider.addEventListener('focusout', function () {
            setHighlightAutoPaused(false);
        });

        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                stopHighlightAutoScroll();
            } else {
                startHighlightAutoScroll();
            }
        });
    }

    async function loadHighlights() {
        const track = document.getElementById('highlight-track');

        try {
            const response = await fetch('./highlight/highlights.json?v=20260626-highlight', { cache: 'no-store' });
            if (!response.ok) {
                throw new Error(`Failed to load highlight/highlights.json: ${response.status}`);
            }

            const data = await response.json();
            if (!Array.isArray(data) || !data.length) {
                throw new Error('No highlights found in highlight/highlights.json');
            }

            highlightItems = data;
            highlightIndex = 0;
            track.innerHTML = '';
            highlightItems.forEach(item => {
                track.appendChild(buildHighlightSlide(item));
            });

            renderHighlightIndicators();
            updateHighlightSlider();
            bindHighlightGestures();
            startHighlightAutoScroll();
        } catch (error) {
            console.error(error);
            highlightItems = fallbackHighlightItems;
            highlightIndex = 0;
            track.innerHTML = '';
            highlightItems.forEach(item => {
                track.appendChild(buildHighlightSlide(item));
            });
            renderHighlightIndicators();
            updateHighlightSlider();
            bindHighlightGestures();
            startHighlightAutoScroll();
        }
    }

    document.addEventListener("DOMContentLoaded", function () {
        const images = document.querySelectorAll("img");

        images.forEach(img => {
            if (img.hasAttribute('data-src')) {
                img.setAttribute('loading', 'lazy');
                img.src = img.getAttribute('data-src');
            }
        });

        loadHighlights();
        loadGallery();
        loadNews();
    });

</script>
