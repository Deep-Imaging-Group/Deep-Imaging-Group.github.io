<script>
    const membersPath = './members/members.json?v=20260626-members-lazy';
    const memberSections = [
        { key: 'professors', title: 'Professors', cards: true, priority: true },
        { key: 'post_docs', title: 'Post Doc', cards: true, priority: true },
        { key: 'phd_students', title: 'Ph.D. Students', cards: true },
        { key: 'ms_students', title: 'M.S. Students', cards: true },
        { key: 'undergraduate_students', title: 'Undergraduate Students', cards: false },
        { key: 'alumni', title: 'Alumni', cards: true, lazy: true }
    ];

    function createTextLink(text, href) {
        if (!href) {
            const span = document.createElement('span');
            span.textContent = text || '';
            return span;
        }

        const link = document.createElement('a');
        link.href = href;
        link.textContent = text || '';
        return link;
    }

    function createMemberCard(member, priorityImage) {
        const col = document.createElement('div');
        col.className = 'col-6 col-md-4 col-lg-3 member-col';

        const card = document.createElement('div');
        card.className = 'card';

        if (member.image) {
            const imageLink = document.createElement('a');
            imageLink.href = member.link || '';

            const image = document.createElement('img');
            image.src = member.image;
            image.alt = member.name || 'DIG member';
            image.loading = priorityImage ? 'eager' : 'lazy';
            image.decoding = 'async';
            if (priorityImage) {
                image.fetchPriority = 'high';
            }
            image.style.width = '100%';
            image.style.margin = 'auto';

            imageLink.appendChild(image);
            card.appendChild(imageLink);
        }

        const meta = document.createElement('div');
        meta.className = 'post-meta';

        const nameLine = document.createElement('span');
        nameLine.className = 'd-block';
        nameLine.style.paddingTop = '10px';
        nameLine.appendChild(createTextLink(member.name, member.link));

        if (member.email) {
            nameLine.appendChild(document.createElement('br'));
            nameLine.appendChild(createTextLink(member.email, `mailto:${member.email}`));
        }
        meta.appendChild(nameLine);

        if (member.period) {
            const period = document.createElement('span');
            period.className = 'd-block';
            period.textContent = member.period;
            meta.appendChild(period);
        }

        if (member.description) {
            const description = document.createElement('span');
            description.className = 'd-block';
            description.style.paddingTop = '10px';
            description.textContent = member.description;
            meta.appendChild(description);
        }

        card.appendChild(meta);
        col.appendChild(card);
        return col;
    }

    function createMemberCardsRow(title, members, priorityImage) {
        const row = document.createElement('div');
        row.className = 'row justify-content-md-left';
        row.style.marginTop = title === 'Professors' || title === 'Post Doc' ? '40px' : '20px';
        members.forEach(member => row.appendChild(createMemberCard(member, priorityImage)));
        return row;
    }

    function createMemberSection(sectionConfig, members) {
        const section = document.createElement('div');
        section.className = 'col-lg-12';
        if (sectionConfig.title === 'Alumni') {
            section.style.marginBottom = '50px';
        }

        const headingWrap = document.createElement('div');
        headingWrap.style.marginBottom = '20px';
        const heading = document.createElement('h2');
        heading.textContent = sectionConfig.title;
        headingWrap.appendChild(heading);
        section.appendChild(headingWrap);

        if (sectionConfig.cards) {
            section.appendChild(createMemberCardsRow(sectionConfig.title, members, Boolean(sectionConfig.priority)));
        } else {
            const list = document.createElement('ul');
            members.forEach(member => {
                const item = document.createElement('li');
                item.textContent = [member.name, member.description, member.period].filter(Boolean).join(', ');
                list.appendChild(item);
            });
            section.appendChild(list);
        }

        return section;
    }

    function createLazyAlumniSection(sectionConfig, members) {
        const section = document.createElement('div');
        section.className = 'col-lg-12';
        section.style.marginBottom = '50px';

        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'member-collapse-header';
        button.setAttribute('aria-expanded', 'false');

        const title = document.createElement('h2');
        const icon = document.createElement('i');
        icon.className = 'fas fa-arrow-right arrow';
        title.appendChild(icon);
        title.appendChild(document.createTextNode(` ${sectionConfig.title}`));
        button.appendChild(title);

        const count = document.createElement('span');
        count.className = 'member-collapse-count';
        count.textContent = `${members.length} members`;
        button.appendChild(count);

        const content = document.createElement('div');
        content.className = 'member-collapse-content';
        content.dataset.rendered = 'false';

        button.onclick = function () {
            const isOpening = !content.classList.contains('active');
            content.classList.toggle('active', isOpening);
            button.setAttribute('aria-expanded', String(isOpening));
            icon.classList.toggle('fa-arrow-down', isOpening);
            icon.classList.toggle('fa-arrow-right', !isOpening);

            if (isOpening && content.dataset.rendered !== 'true') {
                content.appendChild(createMemberCardsRow(sectionConfig.title, members, false));
                content.dataset.rendered = 'true';
            }
        };

        section.appendChild(button);
        section.appendChild(content);
        return section;
    }

    async function loadMembers() {
        const container = document.getElementById('members-content');
        if (!container) {
            return;
        }

        try {
            const response = await fetch(membersPath);
            if (!response.ok) {
                throw new Error(`Failed to load members.json: ${response.status}`);
            }
            const data = await response.json();
            container.innerHTML = '';
            memberSections.forEach(section => {
                const members = Array.isArray(data[section.key]) ? data[section.key] : [];
                if (members.length) {
                    container.appendChild(section.lazy
                        ? createLazyAlumniSection(section, members)
                        : createMemberSection(section, members));
                }
            });
        } catch (error) {
            console.error(error);
            const loading = container.querySelector('.members-loading');
            if (loading) {
                loading.textContent = 'Failed to load members. Please refresh the page.';
            }
        }
    }

    document.addEventListener('DOMContentLoaded', loadMembers);
</script>
